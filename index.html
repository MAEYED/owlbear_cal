<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owlbear Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2/lib/index.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #242424;
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .calc-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        #display {
            grid-column: span 4;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 10px;
        }
        button {
            background-color: #3a3a3a;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #555; }
        .op { background-color: #646cff; }
        .op:hover { background-color: #535bf2; }
        .clear { background-color: #e53935; grid-column: span 2;}
        .clear:hover { background-color: #d32f2f; }
        .equals { background-color: #4caf50; grid-column: span 2;}
        .equals:hover { background-color: #43a047; }
    </style>
</head>
<body>
    <div class="calc-container">
        <input type="text" id="display" disabled value="0">
        
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="appendOp('/')">/</button>
        <button class="op" onclick="appendOp('*')">*</button>
        
        <button onclick="appendNum('7')">7</button>
        <button onclick="appendNum('8')">8</button>
        <button onclick="appendNum('9')">9</button>
        <button class="op" onclick="appendOp('-')">-</button>
        
        <button onclick="appendNum('4')">4</button>
        <button onclick="appendNum('5')">5</button>
        <button onclick="appendNum('6')">6</button>
        <button class="op" onclick="appendOp('+')">+</button>
        
        <button onclick="appendNum('1')">1</button>
        <button onclick="appendNum('2')">2</button>
        <button onclick="appendNum('3')">3</button>
        <button class="equals" onclick="calculate()">=</button>
        
        <button onclick="appendNum('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendNum('.')">.</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
