<!DOCTYPE html>
<html>
<head>
  <script src="https://owlbear-rodeo.unpkg.com/@owlbear-rodeo/sdk@1.13.0/lib/owlbear.js"></script>
</head>
<body>
  <script>
    OBR.onReady(() => {
      // Create a button in the main Extensions toolbar
      OBR.action.create({
        id: "com.your-name.character-manager-action",
        icons: [
          {
            icon: "/icon.svg",
            label: "Character Sheets",
            filter: {
              active: false,
            },
          },
        ],
        onClick() {
          // Open the modal when the toolbar button is clicked
          OBR.modal.open({
            id: "com.your-name.character-manager-modal",
            url: "/popup.html",
            height: 600,
            width: 400,
          });
        },
      });
    });
  </script>
</body>
</html>
