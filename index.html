<!DOCTYPE html>
<html>
<head>
  <script src="https://owlbear-rodeo.unpkg.com/@owlbear-rodeo/sdk@1.13.0/lib/owlbear.js"></script>
</head>
<body>
  <script>
    OBR.onReady(() => {
      OBR.contextMenu.create({
        id: "com.your-name.character-sheet-menu",
        icons: [
          {
            icon: "/icon.svg",
            label: "Character Sheet",
            filter: {
              every: [{ key: "layer", value: "CHARACTER" }],
            },
          },
        ],
        onClick(context) {
          const itemId = context.items[0].id;
          OBR.modal.open({
            id: "com.your-name.character-sheet-modal",
            url: `/popup.html?id=${itemId}`,
            height: 600,
            width: 400,
          });
        },
      });
    });
  </script>
</body>
</html>
