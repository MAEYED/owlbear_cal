<!DOCTYPE html>
<html>
<head>
  <script src="https://owlbear-rodeo.unpkg.com/@owlbear-rodeo/sdk@1.13.0/lib/owlbear.js"></script>
</head>
<body>
  <script>
    OBR.onReady(() => {
      OBR.contextMenu.create({
        id: "pop-me-up-context-menu",
        icons: [
          {
            icon: "/icon.svg",
            label: "Pop Me Up",
            filter: {
              every: [{ key: "layer", value: "CHARACTER" }],
            },
          },
        ],
        onClick(context) {
          const itemId = context.items[0].id;
          // Open a modal window right in the middle of the screen
          OBR.modal.open({
            id: "pop-me-up-modal",
            url: '/popup.html?id=${itemId}',
            height: 550,
            width: 400,
          });
        },
      });
    });
  </script>
</body>
</html>
