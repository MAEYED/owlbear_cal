<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 15px; color: #eee; background: #242424; margin: 0; }
    h2 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
    img { max-width: 100%; max-height: 250px; display: block; margin: 0 auto 15px auto; border-radius: 8px; }
    .hidden { display: none !important; }
    textarea, input { width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px;}
    button { width: 100%; padding: 10px; cursor: pointer; background: #5a42f5; color: white; border: none; border-radius: 4px; margin-bottom: 5px; font-weight: bold;}
    button:hover { background: #4a35cf; }
    #cancelBtn { background: #555; }
    #cancelBtn:hover { background: #444; }
  </style>
</head>
<body>
  <h2 id="charName">Loading...</h2>
  
  <div id="viewMode">
     <img id="charImg" src="" alt="Image Loading..." />
     <p id="charInfo" style="white-space: pre-wrap;">No information set.</p>
     <button id="editBtn">Edit Information</button>
  </div>

  <div id="editMode" class="hidden">
     <label>Custom Image URL (optional):</label>
     <input type="text" id="imgInput" placeholder="https://example.com/image.jpg" />
     <label>Brief Info / Lore:</label>
     <textarea id="infoInput" rows="6" placeholder="Enter character details..."></textarea>
     <button id="saveBtn">Save to Token</button>
     <button id="cancelBtn">Cancel</button>
  </div>

  <script type="module">
    import OBR from "https://esm.sh/@owlbear-rodeo/sdk@1.13.0";

    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    const METADATA_KEY = "pop-me-up/data";
    let currentItem = null;

    OBR.onReady(async () => {
      const items = await OBR.scene.items.getItems([itemId]);
      if (items.length > 0) {
         currentItem = items[0];
         render();
      }
    });

    function render() {
       document.getElementById("charName").innerText = currentItem.name || "Unnamed Character";
       const data = currentItem.metadata[METADATA_KEY] || { imageUrl: "", info: "" };
       
       document.getElementById("charImg").src = data.imageUrl || currentItem.image.url; 
       document.getElementById("charInfo").innerText = data.info || "No information available. Click Edit to add some.";
       
       document.getElementById("imgInput").value = data.imageUrl || "";
       document.getElementById("infoInput").value = data.info || "";
    }

    document.getElementById("editBtn").onclick = () => {
       document.getElementById("viewMode").classList.add("hidden");
       document.getElementById("editMode").classList.remove("hidden");
    };

    document.getElementById("cancelBtn").onclick = () => {
       document.getElementById("editMode").classList.add("hidden");
       document.getElementById("viewMode").classList.remove("hidden");
    };

    document.getElementById("saveBtn").onclick = async () => {
       const newImg = document.getElementById("imgInput").value;
       const newInfo = document.getElementById("infoInput").value;
       
       await OBR.scene.items.updateItems([itemId], (items) => {
          items[0].metadata[METADATA_KEY] = {
             imageUrl: newImg,
             info: newInfo
          };
       });

       currentItem.metadata[METADATA_KEY] = { imageUrl: newImg, info: newInfo };
       render();

       document.getElementById("editMode").classList.add("hidden");
       document.getElementById("viewMode").classList.remove("hidden");
    };
  </script>
</body>
</html>
