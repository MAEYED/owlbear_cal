<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@owlbear-rodeo/sdk@1.13.0/lib/owlbear.js"></script>
</head>
<body>
  <script>
    OBR.onReady(() => {
      OBR.contextMenu.create({
        // แก้ไข ID ตรงนี้ให้มี / ตามกฎของ Owlbear
        id: "com.my-custom-addon.pop-me-up/context-menu",
        icons: [
          {
            icon: "icon.svg", // เอา / ข้างหน้าออก เผื่อมีปัญหาเรื่อง Path
            label: "Pop Me Up",
            filter: {
              every: [{ key: "layer", value: "CHARACTER" }],
            },
          },
        ],
        onClick(context) {
          const itemId = context.items[0].id;
          // เปิดหน้าต่าง Modal ก็ต้องแก้ ID ให้มี / ด้วยเช่นกัน
          OBR.modal.open({
            id: "com.my-custom-addon.pop-me-up/modal",
            url: `popup.html?id=${itemId}`,
            height: 550,
            width: 400,
          });
        },
      });
    });
  </script>
</body>
</html>
